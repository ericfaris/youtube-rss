services:
  app:
    build: .
    image: ericfaris/youtube-rss:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
    environment:
      # External URL used in RSS feed links — must be reachable by your podcast app
      - BASE_URL=https://rss.mooseflip.com

      # Web UI login credentials (set in .env file)
      # Multi-user: AUTH_USERS=alice:pass1,bob:pass2 (takes precedence)
      - AUTH_USERS=${AUTH_USERS:-}
      # Single-user fallback (used if AUTH_USERS is not set)
      - AUTH_USER=${AUTH_USER:-}
      - AUTH_PASS=${AUTH_PASS:-}

      # How many episodes to keep per channel (older ones are pruned)
      - MAX_EPISODES_PER_CHANNEL=20

      # How often to check channels for new videos (in hours)
      - POLL_INTERVAL_HOURS=2

      # Internal data directory — leave this as-is
      - DATA_DIR=/data

      # Uncomment after uploading cookies via the UI
      # - COOKIES_FILE=/data/cookies.txt

      # Email alerts when the cookies file expires / needs re-uploading.
      # Gmail SMTP (same setup as the mobilism-search project). SMTP_PASS must
      # be a Gmail App Password — https://myaccount.google.com/apppasswords
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - ALERT_EMAIL=${ALERT_EMAIL:-ericfaris@gmail.com}
